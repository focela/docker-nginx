#----------------------------------------------------------------------
# Nginx Log Parsers Configuration for Fluent Bit
#
# Purpose: Defines parsing patterns for various nginx log formats including
# access logs, error logs, and blocked request logs. Supports both standard
# text-based formats and JSON formats for structured logging.
#
# Usage: Referenced by Fluent Bit input configurations to parse nginx logs
# and extract structured data fields for processing and forwarding.
#----------------------------------------------------------------------

#----------------------------------------------------------------------
# ACCESS LOG PARSERS
#----------------------------------------------------------------------
# Standard nginx access log parser for regular HTTP requests
# Captures: timestamp, client IP, host, user, status, method, URI, request ID,
#           protocol, bytes sent, referer, user agent, and custom fields
[PARSER]
    Name   nginx-standard
    Format regex
    Regex ^(?<time>[^ ]*) (?<remote_addr>[^ ]*) (?<host>[^ ]*) (?<remote_user>[^ ]*) (?<status>[^ ]*) (?<request_method>\S+) "(?<request_uri>[^\"]*)" (?<request_id>[^ ]*) (?<server_protocol>[^ ]*) (?<body_bytes_sent>[^ ]*)(?: "(?<referer>[^\"]*)" "(?<agent>[^\"]*)" "(?<custom>[^\"]*)")
    Time_Key time
    Time_Format %Y-%m-%dT%H:%M:%S%z

# JSON format parser for structured nginx access logs
# Uses native JSON parsing for logs formatted as JSON objects
[PARSER]
    Name   nginx-json
    Format json
    Time_Key time

#----------------------------------------------------------------------
# BLOCKED REQUEST PARSERS
#----------------------------------------------------------------------
# Parser for nginx blocked requests (bot blocking, security filters)
# Similar to standard format but without body_bytes_sent field
# Captures: timestamp, client IP, host, user, status, method, URI, request ID,
#           protocol, referer, and user agent
[PARSER]
    Name   nginx-blocked-standard
    Format regex
    Regex ^(?<time>[^ ]*) (?<remote_addr>[^ ]*) (?<host>[^ ]*) (?<remote_user>[^ ]*) (?<status>[^ ]*) (?<request_method>\S+) "(?<request_uri>[^\"]*)" (?<request_id>[^ ]*) (?<server_protocol>[^ ]*) (?: "(?<referer>[^\"]*)" "(?<agent>[^\"]*)")
    Time_Key time
    Time_Format %Y-%m-%dT%H:%M:%S%z

# JSON format parser for structured nginx blocked request logs
[PARSER]
    Name   nginx-blocked-json
    Format json
    Time_Key time

#----------------------------------------------------------------------
# ERROR LOG PARSERS  
#----------------------------------------------------------------------
# Standard nginx error log parser for detailed error messages
# Captures: timestamp, log level, process ID, thread ID, worker ID, message,
#           client IP, server name, HTTP method, path, upstream, host, referrer
# Format: YYYY/MM/DD HH:MM:SS [level] pid#tid: *worker message, client: IP, 
#         server: name, request: "METHOD path", upstream: "backend", 
#         host: "hostname", referrer: "url"
[PARSER]
    Name   nginx-error-standard
    Format regex
    Regex ^(?<time>\d{4}\/\d{2}\/\d{2} \d{2}:\d{2}:\d{2}) \[(?<log_level>\w+)\] (?<pid>\d+).(?<tid>\d+): \*(?<worker>\d+) *(?<message>.* client): (?<remote>[^ ]*), server:(?<server>[^ ]*) , request: \"(?<method>\S+)(?: +(?<path>[^\"]*?)(?: +\S*),) upstream: \"(?<upstream>[^ ]*)", host: \"(?<host>[^ ]*)\", referrer: "(?<referrer>[^ ]*)"
    Time_Key time
    Time_Format %Y/%m/%d %H:%M:%S

# Alternative nginx error log parser for simpler error message format
# Handles error logs without upstream or referrer information
# Captures: timestamp, log level, process ID, thread ID, worker ID, message,
#           client IP, server name, HTTP method, path, and host
[PARSER]
    Name   nginx-error-alt-standard
    Format regex
    Regex ^(?<time>\d{4}\/\d{2}\/\d{2} \d{2}:\d{2}:\d{2}) \[(?<log_level>\w+)\] (?<pid>\d+).(?<tid>\d+): \*(?<worker>\d+) *(?<message>.*), client: (?<remote>[^ ]*), server: (?<server>[^ ]*), request: \"(?<method>\S+)(?: +(?<path>[^\"]*?)(?: +\S*),) host: "(?<host>[^ ]*)".*
    Time_Key time
    Time_Format %Y/%m/%d %H:%M:%S
