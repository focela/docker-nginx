#----------------------------------------------------------------------
# Zabbix Agent Nginx Monitoring Configuration
#
# Purpose: Configuration file for Zabbix Agent to monitor nginx web server
# performance metrics and status information. Integrates with nginx
# stub_status module to collect server statistics for monitoring and alerting.
#
# Usage: This configuration file is automatically loaded by Zabbix Agent
# from the /etc/zabbix/zabbix_agentd.conf.d/ directory. Enables nginx
# monitoring capabilities for Zabbix monitoring system.
#
# Requirements:
# - Zabbix Agent 5.4 or higher
# - Nginx with stub_status module enabled
# - Nginx monitoring template from docker-nginx project
# - Proper network access to nginx status endpoint
#----------------------------------------------------------------------

#----------------------------------------------------------------------
# NGINX MONITORING CONFIGURATION
#----------------------------------------------------------------------
# Configuration for nginx web server monitoring via Zabbix Agent
# Utilizes nginx stub_status module for performance metrics collection

# Nginx stub_status monitoring for Zabbix Agent 5.4+
# This configuration enables Zabbix to collect nginx server statistics
# including active connections, request counts, and server performance metrics
#
# Monitored metrics typically include:
# - Active connections (current client connections)
# - Total handled connections (cumulative connections processed)
# - Total requests (cumulative requests served)
# - Connection states (reading, writing, waiting)
# - Request rate and connection rate statistics
#
# Data collection method:
# All data metric collection is handled by the Zabbix monitoring template
# rather than individual item configurations in this file. The template
# provides pre-configured items, triggers, and graphs for comprehensive
# nginx monitoring.

# Template source and documentation:
# Get the complete nginx monitoring template at:
# https://github.com/focela/docker-nginx
#
# The template includes:
# - Pre-configured monitoring items for all nginx metrics
# - Performance graphs and dashboards
# - Alert triggers for common nginx issues
# - Documentation for setup and configuration

#----------------------------------------------------------------------
# AUTO-REGISTRATION CONFIGURATION
#----------------------------------------------------------------------
# Configure automatic host registration with nginx monitoring capabilities

# Automatic host registration identifier
# Autoregister=nginx
#
# This identifier enables automatic registration of nginx-enabled hosts
# in Zabbix monitoring system with appropriate nginx monitoring template
# applied automatically upon host discovery.
#
# Benefits of auto-registration:
# - Automatic host discovery and registration
# - Template assignment without manual configuration
# - Consistent monitoring setup across nginx deployments
# - Simplified monitoring deployment in containerized environments

#----------------------------------------------------------------------
# CONFIGURATION NOTES FOR ADMINISTRATORS
#----------------------------------------------------------------------
# Important setup requirements and considerations:
#
# 1. Nginx Configuration:
#    - Ensure nginx stub_status module is compiled and enabled
#    - Configure nginx status endpoint (typically /stub_status)
#    - Restrict status endpoint access to localhost/monitoring networks
#
# 2. Network Configuration:
#    - Ensure Zabbix Agent can access nginx status endpoint
#    - Configure firewall rules for Zabbix Agent communication
#    - Verify nginx status endpoint returns valid metrics
#
# 3. Template Installation:
#    - Import nginx monitoring template from docker-nginx project
#    - Configure template items for your nginx status endpoint URL
#    - Adjust trigger thresholds based on your environment requirements
#
# 4. Troubleshooting:
#    - Verify nginx status endpoint accessibility: curl localhost/stub_status
#    - Check Zabbix Agent logs for connection errors
#    - Confirm template items are properly configured for your environment
