#----------------------------------------------------------------------
# Nginx Main Configuration File
#
# Purpose: Primary nginx configuration file that defines global settings,
# worker process configuration, HTTP protocol handling, and includes
# modular configuration snippets for comprehensive web server functionality.
#
# Usage: Main configuration file loaded by nginx daemon on startup.
# Template variables are substituted during container initialization
# based on environment settings for optimal performance tuning.
#
# Configuration Areas:
# - Process and user management
# - Worker process optimization
# - Event handling and connections
# - HTTP protocol configuration
# - Performance optimizations
# - Security settings
# - Modular configuration includes
#----------------------------------------------------------------------

#----------------------------------------------------------------------
# GLOBAL PROCESS CONFIGURATION
#----------------------------------------------------------------------
# Configure nginx daemon behavior and process management

# Run nginx in foreground mode for container environments
# Prevents daemon from backgrounding, required for proper container lifecycle
daemon off;

# Set nginx process user and group for security
# Template variables: NGINX_USER (default: nginx), NGINX_GROUP (default: www-data)
# Ensures nginx processes run with appropriate non-root privileges
user {{NGINX_USER}} {{NGINX_GROUP}};

#----------------------------------------------------------------------
# WORKER PROCESS OPTIMIZATION
#----------------------------------------------------------------------
# Configure nginx worker processes for optimal performance and scalability

# Set number of worker processes
# Template variable: NGINX_WORKER_PROCESSES (default: auto)
# 'auto' automatically matches number of CPU cores for optimal performance
worker_processes {{NGINX_WORKER_PROCESSES}};

# Set maximum number of open file descriptors per worker process
# Template variable: NGINX_WORKER_RLIMIT_NOFILE (default: 100000)
# High limit prevents "too many open files" errors under heavy load
worker_rlimit_nofile {{NGINX_WORKER_RLIMIT_NOFILE}};

# Set PID file location for process management
# Standard location for nginx process identification
pid /var/run/nginx.pid;

# Enable PCRE JIT compilation for improved regex performance
# Significantly improves performance of regex-based location matching
pcre_jit on;

#----------------------------------------------------------------------
# EVENT HANDLING CONFIGURATION
#----------------------------------------------------------------------
# Configure nginx event processing and connection handling
events {
  # Use epoll event method for optimal Linux performance
  # Most efficient event method for high-concurrency Linux environments
  use epoll;
  
  # Set maximum concurrent connections per worker process
  # Template variable: NGINX_WORKER_CONNECTIONS (default: 1024)
  # Total server capacity = worker_processes × worker_connections
  worker_connections {{NGINX_WORKER_CONNECTIONS}};
  
  # Enable accepting multiple connections simultaneously
  # Improves performance by reducing system call overhead
  multi_accept on;
}

#----------------------------------------------------------------------
# HTTP PROTOCOL CONFIGURATION
#----------------------------------------------------------------------
# Main HTTP configuration block with protocol settings and optimizations
http {
  #----------------------------------------------------------------------
  # MIME TYPE CONFIGURATION
  #----------------------------------------------------------------------
  # Include MIME type definitions for proper content-type headers
  include /etc/nginx/mime.types;
  
  # Set default MIME type for unknown file extensions
  # Binary stream type prevents browser interpretation of unknown files
  default_type application/octet-stream;

  #----------------------------------------------------------------------
  # NETWORK OPTIMIZATION SETTINGS
  #----------------------------------------------------------------------
  # Configure TCP and file serving optimizations for better performance
  
  # Enable efficient file serving via sendfile system call
  # Bypasses user space for improved static file serving performance
  sendfile on;
  
  # Enable TCP_NOPUSH for sendfile efficiency
  # Reduces number of TCP packets by combining headers with file data
  tcp_nopush on;
  
  # Enable TCP_NODELAY for low-latency connections
  # Disables Nagle algorithm for reduced latency on persistent connections
  tcp_nodelay on;

  #----------------------------------------------------------------------
  # TIMEOUT CONFIGURATION
  #----------------------------------------------------------------------
  # Configure various timeout settings for optimal client handling
  
  # Set timeout for reading client request body
  # Template variable: NGINX_CLIENT_BODY_TIMEOUT (default: 60s)
  client_body_timeout {{NGINX_CLIENT_BODY_TIMEOUT}};
  
  # Set timeout for sending response to client
  # Template variable: NGINX_SEND_TIMEOUT (default: 60s)
  send_timeout {{NGINX_SEND_TIMEOUT}};
  
  # Enable resetting timed-out connections
  # Frees up resources by properly closing timed-out connections
  reset_timedout_connection on;

  #----------------------------------------------------------------------
  # KEEPALIVE CONNECTION SETTINGS
  #----------------------------------------------------------------------
  # Configure persistent connection handling for improved performance
  
  # Set keepalive connection timeout
  # Template variable: NGINX_KEEPALIVE_TIMEOUT (default: 75s)
  # Balances connection reuse with resource conservation
  keepalive_timeout {{NGINX_KEEPALIVE_TIMEOUT}};
  
  # Set maximum requests per keepalive connection
  # Template variable: NGINX_KEEPALIVE_REQUESTS (default: 100000)
  # High limit allows extensive connection reuse for better performance
  keepalive_requests {{NGINX_KEEPALIVE_REQUESTS}};

  #----------------------------------------------------------------------
  # CLIENT REQUEST BUFFER SETTINGS
  #----------------------------------------------------------------------
  # Configure buffer sizes for client request handling
  
  # Set maximum allowed client request body size
  # Template variable: NGINX_UPLOAD_MAX_SIZE (default: 2G)
  # Controls maximum file upload size and request body limits
  client_max_body_size {{NGINX_UPLOAD_MAX_SIZE}};
  
  # Set buffer size for client request body
  # Template variable: NGINX_CLIENT_BODY_BUFFER_SIZE (default: 16k)
  # Optimized for typical web request sizes
  client_body_buffer_size {{NGINX_CLIENT_BODY_BUFFER_SIZE}};

  #----------------------------------------------------------------------
  # FASTCGI BUFFER SETTINGS
  #----------------------------------------------------------------------
  # Configure FastCGI buffers for PHP and similar processors
  
  # Set number and size of FastCGI buffers
  # Template variable: NGINX_FASTCGI_BUFFERS (default: 16 16k)
  # Optimized for typical PHP application response sizes
  fastcgi_buffers {{NGINX_FASTCGI_BUFFERS}};
  
  # Set size of buffer for FastCGI response headers
  # Template variable: NGINX_FASTCGI_BUFFER_SIZE (default: 32k)
  # Sized for typical FastCGI header requirements
  fastcgi_buffer_size {{NGINX_FASTCGI_BUFFER_SIZE}};

  #----------------------------------------------------------------------
  # PROXY BUFFER SETTINGS
  #----------------------------------------------------------------------
  # Configure proxy buffers for reverse proxy operations
  
  # Set size of buffer for proxy response headers
  # Template variable: NGINX_PROXY_BUFFER_SIZE (default: 128k)
  proxy_buffer_size {{NGINX_PROXY_BUFFER_SIZE}};
  
  # Set number and size of proxy buffers
  # Template variable: NGINX_PROXY_BUFFERS (default: 4 256k)
  proxy_buffers {{NGINX_PROXY_BUFFERS}};
  
  # Set size of busy buffers for proxy responses
  # Template variable: NGINX_PROXY_BUSY_BUFFERS_SIZE (default: 256k)
  proxy_busy_buffers_size {{NGINX_PROXY_BUSY_BUFFERS_SIZE}};

  #----------------------------------------------------------------------
  # SERVER NAME HASH CONFIGURATION
  #----------------------------------------------------------------------
  # Configure hash table for server name lookups
  
  # Set bucket size for server names hash table
  # Template variable: NGINX_SERVER_NAMES_HASH_BUCKET_SIZE (default: 32)
  # Optimized for deployments with many virtual hosts
  server_names_hash_bucket_size {{NGINX_SERVER_NAMES_HASH_BUCKET_SIZE}};

  #----------------------------------------------------------------------
  # SECURITY SETTINGS
  #----------------------------------------------------------------------
  # Configure security-related headers and server information
  
  # Disable nginx version disclosure in response headers
  # Prevents version information leakage for security
  server_tokens off;
  
  # Clear Server header completely using headers-more module
  # Additional security measure to remove server identification
  more_clear_headers Server;

  #----------------------------------------------------------------------
  # MODULAR CONFIGURATION INCLUDES
  #----------------------------------------------------------------------
  # Include various configuration snippets for specific functionality
  
  # Core functionality includes
  # Logging configuration and formats
  include /etc/nginx/snippets/logging.conf;

  # Real IP detection for proxied requests
  include /etc/nginx/snippets/reverse_proxy.conf;

  # Bot blocking and rate limiting
  include /etc/nginx/snippets/bot_blocker.conf;

  # DDoS protection and connection limits
  include /etc/nginx/snippets/ddos_protection.conf;

  # File caching for performance
  include /etc/nginx/snippets/open_file_cache.conf;

  # DNS resolver configuration
  include /etc/nginx/snippets/resolver.conf;

  # Gzip compression settings
  include /etc/nginx/snippets/compression_gzip.conf;

  # Brotli compression settings
  include /etc/nginx/snippets/compression_brotli.conf;

  # Server monitoring and status
  include /etc/nginx/snippets/monitoring.conf;

  #----------------------------------------------------------------------
  # UPSTREAM CONFIGURATION SECTION
  #----------------------------------------------------------------------
  # Placeholder for upstream server configurations
  # Do not delete - Upstream Configuration

  #----------------------------------------------------------------------
  # SITE AND TEMPLATE INCLUDES
  #----------------------------------------------------------------------
  # Include site configurations and operational templates

  # Include enabled site configurations
  include /etc/nginx/sites.enabled/*.conf;

  # Include operational mode templates
  # Maintenance mode configuration
  include /etc/nginx/templates/maintenance.template;

  # Reverse proxy mode configuration
  include /etc/nginx/templates/proxy.template;

  # Redirect mode configuration
  include /etc/nginx/templates/redirect.template;
}
