#----------------------------------------------------------------------
# Nginx Monitoring Configuration
#
# Purpose: Provides internal monitoring endpoint for nginx server statistics
# and health checking. Exposes nginx stub_status module data for monitoring
# systems like Zabbix, Prometheus, or custom health check scripts.
#
# Usage: Creates localhost-only monitoring server on port 73 with /stub_status
# endpoint. Used by container monitoring and alerting systems to track nginx
# performance metrics and availability status.
#
# Security: Restricted to localhost access only to prevent information disclosure.
#----------------------------------------------------------------------

#----------------------------------------------------------------------
# MONITORING SERVER CONFIGURATION
#----------------------------------------------------------------------
# Internal monitoring server accessible only from localhost
# Provides nginx performance statistics and health status information
server {
  # Listen on port 73 for monitoring requests
  # Port 73 is typically used for internal monitoring to avoid conflicts
  # with standard HTTP ports (80, 443) and common application ports
  listen 73;

  # Restrict server name to localhost only
  # Ensures monitoring endpoint is only accessible from within the container
  server_name 127.0.0.1;

  #----------------------------------------------------------------------
  # NGINX STATUS ENDPOINT
  #----------------------------------------------------------------------
  # Provides nginx server statistics via stub_status module
  # Returns metrics like active connections, requests handled, and connection states
  location /stub_status {
    # Enable nginx stub_status module
    # Provides real-time server statistics including:
    # - Active connections
    # - Total handled connections and requests
    # - Reading, writing, and waiting connection states
    stub_status on;

    # Disable access logging for monitoring requests
    # Prevents monitoring traffic from cluttering access logs
    # Reduces log volume and improves log signal-to-noise ratio
    access_log off;

    # Set custom Server header with nginx version information
    # Template variable: NGINX_VERSION (substituted during container initialization)
    # Useful for monitoring systems to track nginx version deployment
    more_set_headers "Server: nginx/{{NGINX_VERSION}}";

    #----------------------------------------------------------------------
    # ACCESS CONTROL
    #----------------------------------------------------------------------
    # Strict access control to prevent information disclosure

    # Allow access only from localhost
    # Restricts monitoring endpoint to container-internal access
    # Prevents external access to sensitive server statistics
    allow 127.0.0.1;

    # Deny access from all other IP addresses
    # Explicit deny-all rule for security defense in depth
    # Ensures no external access even if allow rules change
    deny all;
  }
}
