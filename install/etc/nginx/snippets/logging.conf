#----------------------------------------------------------------------
# Nginx Logging Configuration
#
# Purpose: Defines comprehensive logging formats for nginx access and error logs.
# Supports multiple output formats including standard text and structured JSON
# for different use cases: normal access logs, blocked request logs, and
# LemonLDAP::NG authenticated requests.
#
# Usage: Included in main nginx configuration to establish log formats and
# configure log file destinations. Template variables are substituted during
# container initialization based on environment settings.
#----------------------------------------------------------------------

#----------------------------------------------------------------------
# STANDARD TEXT-BASED LOG FORMATS
#----------------------------------------------------------------------
# Human-readable log formats suitable for direct analysis and traditional log processing

# Standard access log format for normal HTTP requests
# Fields: timestamp, client_ip, host, user, status, method, uri, request_id, protocol, bytes, referer, user_agent
log_format standard '$time_iso8601 '
                    '$http_x_forwarded_for '
                    '$host '
                    '$remote_user '
                    '$status '
                    '$request_method '
                    '"$request_uri" '
                    '$request_id '
                    '$server_protocol '
                    '$body_bytes_sent '
                    '"$http_referer" '
                    '"$http_user_agent"';

# Blocked request log format for security events
# Similar to standard format but with "BLOCKED" status for security monitoring
# Fields: timestamp, client_ip, host, user, BLOCKED, method, uri, request_id, protocol, referer, user_agent
log_format blocked_standard  '$time_iso8601 '
                            '$http_x_forwarded_for '
                            '$host '
                            '$remote_user '
                            'BLOCKED '
                            '$request_method '
                            '"$request_uri" '
                            '$request_id '
                            '$server_protocol '
                            '"$http_referer" '
                            '"$http_user_agent"';

# LemonLDAP::NG authenticated request log format
# Includes LLNG-specific user information for SSO-enabled applications
# Fields: timestamp, client_ip, host, llng_user, status, method, uri, request_id, protocol, bytes, referer, user_agent, llng_user
# Note: llng_user appears twice - once in standard position and once at end
log_format llng_standard    '$time_iso8601 '
                            '$http_x_forwarded_for '
                            '$host '
                            '$upstream_http_lm_remote_user '
                            '$status '
                            '$request_method '
                            '"$request_uri" '
                            '$request_id '
                            '$server_protocol '
                            '$body_bytes_sent '
                            '"$http_referer" '
                            '"$http_user_agent"'
                            '$upstream_http_lm_remote_user';

#----------------------------------------------------------------------
# STRUCTURED JSON LOG FORMATS
#----------------------------------------------------------------------
# Machine-readable JSON formats for structured logging and log aggregation systems

# Standard JSON access log format
# Structured format suitable for log aggregation systems like ELK stack
# Note: Uses escape=json to properly escape JSON special characters
log_format json escape=json '{ '
                            '"time": "$time_iso8601", '
                            '"remote_addr": "$http_x_forwarded_for", '
                            '"host": "$host", '
                            '"remote_user": "$remote_user", '
                            '"status": "$status", '
                            '"request_method": "$request_method", '
                            '"request_uri": "$request_uri", '
                            '"request_id": "$request_id", '
                            '"server_protocol:": "$server_protocol", '
                            '"body_bytes_sent": "$body_bytes_sent", '
                            '"http_referrer": "$http_referer", '
                            '"http_user_agent": "$http_user_agent" '
                            '}';

# Blocked request JSON log format
# JSON format for blocked requests with "BLOCKED" status for security analysis
# Maintains same structure as standard JSON but with blocked status indicator
log_format blocked_json escape=json '{ '
                                    '"time": "$time_iso8601", '
                                    '"remote_addr": "$http_x_forwarded_for", '
                                    '"host": "$host", '
                                    '"remote_user": "$remote_user", '
                                    '"status": "BLOCKED", '
                                    '"request_method": "$request_method", '
                                    '"request_uri": "$request_uri", '
                                    '"request_id": "$request_id", '
                                    '"server_protocol:": "$server_protocol", '
                                    '"body_bytes_sent": "$body_bytes_sent", '
                                    '"http_referrer": "$http_referer", '
                                    '"http_user_agent": "$http_user_agent" '
                                    '}';

# LemonLDAP::NG JSON log format
# JSON format with LLNG authentication information for SSO-enabled applications
# Includes both standard user field and LLNG-specific custom attributes
log_format llng_json escape=json '{ '
                                '"time": "$time_iso8601", '
                                '"remote_addr": "$http_x_forwarded_for", '
                                '"host": "$host", '
                                '"remote_user": "$upstream_http_lm_remote_user", '
                                '"status": "$status", '
                                '"request_method": "$request_method", '
                                '"request_uri": "$request_uri", '
                                '"request_id": "$request_id", '
                                '"server_protocol:": "$server_protocol", '
                                '"body_bytes_sent": "$body_bytes_sent", '
                                '"http_referrer": "$http_referer", '
                                '"http_user_agent": "$http_user_agent" '
                                '"remote_custom": "$upstream_http_lm_remote_custom" '
                                '}';

#----------------------------------------------------------------------
# LOG FILE CONFIGURATION
#----------------------------------------------------------------------
# Configure actual log file destinations and formats using template variables
# Variables are substituted during container initialization

# Access log configuration
# Template variables:
#   NGINX_LOG_ACCESS_LOCATION: Directory path for access logs
#   NGINX_LOG_ACCESS_FILE: Filename for access logs
#   NGINX_LOG_ACCESS_FORMAT: Log format name (standard, json, llng_standard, etc.)
access_log {{NGINX_LOG_ACCESS_LOCATION}}/{{NGINX_LOG_ACCESS_FILE}} {{NGINX_LOG_ACCESS_FORMAT}};

# Error log configuration
# Template variables:
#   NGINX_LOG_ERROR_LOCATION: Directory path for error logs
#   NGINX_LOG_ERROR_FILE: Filename for error logs
#   NGINX_LOG_LEVEL_ERROR: Error log level (error, warn, info, debug)
error_log {{NGINX_LOG_ERROR_LOCATION}}/{{NGINX_LOG_ERROR_FILE}} {{NGINX_LOG_LEVEL_ERROR}};
