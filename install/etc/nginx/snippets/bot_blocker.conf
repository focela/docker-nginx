#----------------------------------------------------------------------
# Bot Blocker Configuration
#
# Purpose: Configures nginx bot blocking, rate limiting, and DDoS protection
# mechanisms. Sets up hash table sizes, rate limiting zones, and includes
# global blacklist configurations for comprehensive bot protection.
#
# Usage: Included in main nginx configuration when NGINX_ENABLE_BLOCK_BOTS
# is enabled. Provides foundational settings for bot blocking functionality.
#----------------------------------------------------------------------

#----------------------------------------------------------------------
# HASH TABLE OPTIMIZATION
#----------------------------------------------------------------------
# Configure hash table sizes for optimal performance with large numbers
# of server names and variables used in bot blocking configurations

# Server names hash configuration
# Optimized for deployments with many virtual hosts and server name patterns
server_names_hash_bucket_size 256;
server_names_hash_max_size 4096;

# Variables hash configuration  
# Optimized for bot blocking rules that use many nginx variables
variables_hash_max_size 4096;
variables_hash_bucket_size 4096;

#----------------------------------------------------------------------
# RATE LIMITING ZONES
#----------------------------------------------------------------------
# Define rate limiting zones for DDoS protection and bot mitigation
# Uses client IP address ($binary_remote_addr) as the limiting key

# Request rate limiting zone
# Limits requests per second per IP address to prevent request flooding
limit_req_zone $binary_remote_addr zone=flood:50m rate=90r/s;

# Connection limiting zone  
# Limits concurrent connections per IP address to prevent connection exhaustion
limit_conn_zone $binary_remote_addr zone=addr:50m;

#----------------------------------------------------------------------
# GLOBAL BLACKLIST INTEGRATION
#----------------------------------------------------------------------
# Include comprehensive bot blacklist configuration
# Contains user agent patterns, IP blacklists, and referrer blocking rules
include /etc/nginx/snippets/blockbots/globalblacklist.conf;
