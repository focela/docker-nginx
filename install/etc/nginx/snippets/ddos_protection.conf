#----------------------------------------------------------------------
# DDoS Protection Configuration
#
# Purpose: Configures nginx rate limiting and connection limiting to
# protect against Distributed Denial of Service (DDoS) attacks and
# aggressive bot behavior. Implements per-IP restrictions to prevent
# resource exhaustion and maintain service availability.
#
# Usage: Included in main nginx configuration when NGINX_ENABLE_DDOS_PROTECTION
# is enabled. Template variables are substituted during container initialization.
#----------------------------------------------------------------------

#----------------------------------------------------------------------
# RATE LIMITING ZONES DEFINITION
#----------------------------------------------------------------------
# Define shared memory zones for tracking client connections and requests
# Uses binary representation of IP addresses for memory efficiency

# Connection limiting zone
# Tracks concurrent connections per IP address to prevent connection exhaustion
# Template variable: NGINX_DDOS_CONNECTIONS_PER_IP (default: "10m")
# Format: [size] - shared memory size for storing connection state
limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:{{NGINX_DDOS_CONNECTIONS_PER_IP}};

# Request rate limiting zone
# Tracks request frequency per IP address to prevent request flooding
# Template variables:
#   - NGINX_DDOS_CONNECTIONS_PER_IP: Memory size for zone (default: "10m")
#   - NGINX_DDOS_REQUESTS_PER_IP: Rate limit (default: "5r/s")
# Note: Memory size variable name may need review - appears to be shared with connection limit
limit_req_zone $binary_remote_addr zone=req_limit_per_ip:{{NGINX_DDOS_CONNECTIONS_PER_IP}} rate={{NGINX_DDOS_REQUESTS_PER_IP}};

#----------------------------------------------------------------------
# DDOS PROTECTION APPLICATION
#----------------------------------------------------------------------
# Server block that applies DDoS protection limits
# These directives are applied to server contexts where DDoS protection is needed
server {
  # Apply connection limit per IP address
  # Limits concurrent connections to prevent connection exhaustion attacks
  # Limit: 10 concurrent connections per IP address (hardcoded)
  limit_conn conn_limit_per_ip 10;

  # Apply request rate limit per IP address
  # Prevents request flooding while allowing legitimate traffic bursts
  # Configuration:
  #   - zone: req_limit_per_ip (defined above)
  #   - burst: 10 (allows up to 10 requests above the rate limit)
  #   - nodelay: Process burst requests immediately without queueing
  limit_req zone=req_limit_per_ip burst=10 nodelay;
}
