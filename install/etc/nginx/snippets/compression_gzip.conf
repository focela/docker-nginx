#----------------------------------------------------------------------
# Gzip Compression Configuration
#
# Purpose: Configures Gzip compression for improved web performance.
# Gzip reduces file sizes for text-based content, improving page load
# times and reducing bandwidth usage across all HTTP clients.
#
# Usage: Included in main nginx configuration when NGINX_ENABLE_COMPRESSION_GZIP
# is enabled. Template variables are substituted during container initialization.
#----------------------------------------------------------------------

#----------------------------------------------------------------------
# GZIP COMPRESSION SETTINGS
#----------------------------------------------------------------------
# Enable Gzip compression for response content
# Widely supported compression standard compatible with all modern browsers
gzip on;

# Set compression quality level
# Higher levels provide better compression but use more CPU
# Template variable: NGINX_COMPRESSION_GZIP_LEVEL (default: 6)
# Valid range: 1 (fast, less compression) to 9 (slow, best compression)
# Recommended: 4-6 for balanced performance/compression ratio
gzip_comp_level {{NGINX_COMPRESSION_GZIP_LEVEL}};

# Set minimum HTTP version for compression
# Ensures compatibility with HTTP protocol requirements
# Template variable: NGINX_COMPRESSION_GZIP_HTTP_VERSION (default: 1.1)
# Options: 1.0, 1.1 (recommended for modern deployments)
gzip_http_version {{NGINX_COMPRESSION_GZIP_HTTP_VERSION}};

# Configure compression buffers
# Defines memory allocation for compression operations
# Template variable: NGINX_COMPRESSION_GZIP_BUFFERS (default: 16 8k)
# Format: [number] [size] - balances memory usage vs compression efficiency
gzip_buffers {{NGINX_COMPRESSION_GZIP_BUFFERS}};

# Set minimum response length to compress
# Avoids compression overhead for small files where compression may not be beneficial
# Template variable: NGINX_COMPRESSION_GZIP_MIN_LENGTH (default: 10240 bytes)
# Recommended: 1000-20000 bytes depending on typical content size
gzip_min_length {{NGINX_COMPRESSION_GZIP_MIN_LENGTH}};

# Configure compression for proxied requests
# Determines when to compress responses from upstream servers
# Template variable: NGINX_COMPRESSION_GZIP_PROXIED (default: "expired no-cache no-store private auth")
# Options: off, expired, no-cache, no-store, private, no_last_modified, no_etag, auth, any
gzip_proxied {{NGINX_COMPRESSION_GZIP_PROXIED}};

# Specify MIME types to compress
# Only compress text-based content types for optimal benefit
# Template variable: NGINX_COMPRESSION_GZIP_TYPES
# Common types: text/plain, text/css, text/xml, text/javascript,
#               application/json, application/xml, application/javascript
# Note: text/html is always compressed when gzip is enabled
gzip_types {{NGINX_COMPRESSION_GZIP_TYPES}};

# Disable compression for problematic user agents
# Prevents compression issues with legacy browsers
# Template variable: NGINX_COMPRESSION_GZIP_DISABLE (default: "MSIE [1-6].(?!.*SV1)")
# Regex pattern to match User-Agent headers that should not receive compressed content
gzip_disable {{NGINX_COMPRESSION_GZIP_DISABLE}};

# Add Vary header for proper caching behavior
# Ensures proxies and CDNs cache compressed and uncompressed versions separately
# Critical for proper cache behavior with mixed client capabilities
gzip_vary on;
