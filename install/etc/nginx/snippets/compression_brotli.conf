#----------------------------------------------------------------------
# Brotli Compression Configuration
#
# Purpose: Configures Brotli compression for improved web performance.
# Brotli provides better compression ratios than gzip, resulting in
# smaller file sizes and faster page load times for supported browsers.
#
# Usage: Included in main nginx configuration when NGINX_ENABLE_COMPRESSION_BROTLI
# is enabled. Template variables are substituted during container initialization.
#----------------------------------------------------------------------

#----------------------------------------------------------------------
# BROTLI COMPRESSION SETTINGS
#----------------------------------------------------------------------
# Enable Brotli compression for response content
# Brotli typically achieves 15-25% better compression than gzip
brotli on;

# Set sliding window size for compression algorithm
# Larger windows provide better compression but use more memory
# Template variable: NGINX_COMPRESSION_BROTLI_WINDOW (default: 512k)
# Valid range: 1k to 16M, powers of 2 recommended
brotli_window {{NGINX_COMPRESSION_BROTLI_WINDOW}};

# Set minimum response length to compress
# Smaller files may not benefit from compression overhead
# Template variable: NGINX_COMPRESSION_BROTLI_MIN_LENGTH (default: 20 bytes)
brotli_min_length {{NGINX_COMPRESSION_BROTLI_MIN_LENGTH}};

# Set compression quality level
# Higher levels provide better compression but use more CPU
# Template variable: NGINX_COMPRESSION_BROTLI_LEVEL (default: 6)
# Valid range: 0 (no compression) to 11 (maximum compression)
# Recommended: 4-6 for balanced performance/compression ratio
brotli_comp_level {{NGINX_COMPRESSION_BROTLI_LEVEL}};

# Specify MIME types to compress
# Only compress text-based content types for optimal benefit
# Template variable: NGINX_COMPRESSION_BROTLI_TYPES
# Common types: text/plain, text/css, text/xml, text/javascript,
#               application/json, application/xml, application/javascript
brotli_types {{NGINX_COMPRESSION_BROTLI_TYPES}};
