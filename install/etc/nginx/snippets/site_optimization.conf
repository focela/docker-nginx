#----------------------------------------------------------------------
# Nginx Site Optimization Configuration
#
# Purpose: Provides common website optimization directives including
# security restrictions for hidden files, performance optimizations
# for static assets, and proper handling of standard web files like
# robots.txt and favicon.ico.
#
# Usage: Included in nginx server blocks to apply standard web optimization
# patterns. Covers caching policies, security restrictions, and logging
# optimizations for better performance and security posture.
#
# Optimization Areas:
# - Static asset caching and performance
# - Security restrictions for sensitive files
# - Logging optimization for common requests
# - Standard web file handling (robots.txt, favicon, .well-known)
#----------------------------------------------------------------------

#----------------------------------------------------------------------
# GENERAL SECURITY SETTINGS
#----------------------------------------------------------------------
# Configure general security policies for file access

# Disable symlink restrictions for this server context
# Allows nginx to follow symbolic links without additional security checks
# Note: Consider security implications in environments with untrusted content
disable_symlinks off;

#----------------------------------------------------------------------
# STANDARD WEB FILE HANDLING
#----------------------------------------------------------------------
# Optimize handling of common web files that are frequently requested

# robots.txt - Search engine crawler instructions
# Allow universal access and disable logging to reduce log noise
location = /robots.txt {
  # Allow all clients to access robots.txt
  allow all;
  
  # Disable 404 logging for robots.txt requests
  # Reduces log volume as many sites don't have robots.txt
  log_not_found off;
  
  # Disable access logging for robots.txt requests
  # Reduces log noise from frequent crawler requests
  access_log off;
}

# favicon.ico - Browser icon file
# Optimize logging for frequent browser requests
location = /favicon.ico {
  # Disable 404 logging for favicon requests
  # Many sites don't have favicon.ico, preventing log spam
  log_not_found off;
  
  # Disable access logging for favicon requests
  # Reduces log noise from automatic browser requests
  access_log off;
}

# .well-known directory - ACME challenges and RFC 8615 standard
# Used for SSL certificate validation (Let's Encrypt) and web standards
location /.well-known {
  # Set content type to plain text for .well-known responses
  # Required for ACME HTTP-01 challenges and other standards
  # Ensures proper content-type header for certificate validation
  default_type text/plain;
}

#----------------------------------------------------------------------
# SECURITY RESTRICTIONS
#----------------------------------------------------------------------
# Block access to sensitive hidden files while allowing necessary exceptions

# Block access to hidden files (starting with .) except .well-known
# Prevents access to sensitive configuration files and system files
# Pattern explanation: ~/\.(?!well-known).*
# - ~/\. matches files starting with dot
# - (?!well-known) negative lookahead excludes .well-known paths
# - .* matches any remaining characters
location ~ /\.(?!well-known).* {
  # Deny access to all hidden files except .well-known
  # Protects files like .htaccess, .git, .env, .config, etc.
  deny all;
  
  # Disable access logging for blocked hidden file requests
  # Reduces log noise from security scans and accidental requests
  access_log off;
  
  # Disable 404 logging for blocked hidden file requests
  # Prevents log spam from automated security scanning
  log_not_found off;
}

#----------------------------------------------------------------------
# STATIC ASSET OPTIMIZATION
#----------------------------------------------------------------------
# Configure caching and logging for static web assets

# Static asset caching for images, stylesheets, scripts, and other media
# File types: jpg, jpeg, gif, png, css, js, ico, xml
# These files typically don't change frequently and benefit from long caching
location ~* \.(jpg|jpeg|gif|png|css|js|ico|xml)$ {
  # Enable 404 logging for static assets
  # Useful for identifying missing resources and broken links
  # Unlike robots.txt/favicon, missing static assets usually indicate real issues
  log_not_found on;
  
  # Set long cache expiration for static assets
  # 360 days = ~1 year caching for better performance
  # Reduces server load and improves page load times
  # Static assets should use versioning or cache busting for updates
  expires 360d;
}
