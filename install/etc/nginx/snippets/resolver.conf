#----------------------------------------------------------------------
# Nginx DNS Resolver Configuration
#
# Purpose: Configures DNS resolver for nginx to perform hostname lookups
# for upstream servers, proxy_pass directives with variables, and other
# dynamic hostname resolution scenarios. Essential for containerized
# environments where service discovery and dynamic upstream resolution
# are required.
#
# Usage: Included in main nginx configuration when NGINX_RESOLVER environment
# variable is defined. Template variable is substituted during container
# initialization with appropriate DNS server addresses.
#
# Common Use Cases:
# - Dynamic upstream server resolution in containerized environments
# - Service discovery integration (Docker, Kubernetes, Consul)
# - Proxy configurations with variable hostnames
# - Load balancing with DNS-based service discovery
#----------------------------------------------------------------------

#----------------------------------------------------------------------
# DNS RESOLVER CONFIGURATION
#----------------------------------------------------------------------
# Configure DNS resolver for nginx hostname lookups and service discovery

# Set DNS resolver address(es) for nginx hostname resolution
# Template variable: NGINX_RESOLVER
#
# Common resolver configurations:
# - Docker environments: 127.0.0.11 (Docker's embedded DNS server)
# - Kubernetes: kube-dns or CoreDNS service IP
# - Cloud environments: Cloud provider DNS (e.g., 169.254.169.253 for AWS)
# - Traditional environments: System DNS servers (e.g., 8.8.8.8, 1.1.1.1)
# - Corporate networks: Internal DNS servers
#
# Format options:
# - Single resolver: resolver 8.8.8.8;
# - Multiple resolvers: resolver 8.8.8.8 1.1.1.1;
# - With timeout: resolver 8.8.8.8 valid=30s;
# - IPv6 support: resolver [2001:4860:4860::8888];
#
# Required for:
# - proxy_pass with variables (e.g., proxy_pass http://$backend_host;)
# - Upstream blocks with dynamic hostname resolution
# - Service discovery integrations
# - Container orchestration environments
resolver {{NGINX_RESOLVER}};
