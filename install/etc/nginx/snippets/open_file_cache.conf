#----------------------------------------------------------------------
# Nginx Open File Cache Configuration
#
# Purpose: Optimizes nginx file access performance by caching file descriptors,
# directory lookups, and file metadata in memory. Reduces filesystem I/O
# overhead for frequently accessed static files, improving response times
# and server throughput under high load conditions.
#
# Usage: Included in main nginx configuration when NGINX_ENABLE_OPEN_FILE_CACHE
# is enabled. Template variables are substituted during container initialization
# based on environment settings for optimal performance tuning.
#
# Performance Impact: Significantly improves static file serving performance
# by eliminating repeated filesystem lookups and file descriptor operations.
#----------------------------------------------------------------------

#----------------------------------------------------------------------
# OPEN FILE CACHE SETTINGS
#----------------------------------------------------------------------
# Configure nginx's open file cache for optimal static file serving performance
# Caches file descriptors, directory existence, and file metadata to reduce I/O overhead

# Enable open file cache with maximum entries and inactivity timeout
# Template variables:
#   NGINX_OPEN_FILE_CACHE_MAX: Maximum number of cached entries (default: 200000)
#   NGINX_OPEN_FILE_CACHE_INACTIVE: Time after which unused entries are removed (default: 5m)
# 
# Cache stores:
# - File descriptors for open files
# - Directory existence information  
# - File lookup errors (404, permission denied, etc.)
# - File metadata (size, modification time, permissions)
open_file_cache max={{NGINX_OPEN_FILE_CACHE_MAX}} inactive={{NGINX_OPEN_FILE_CACHE_INACTIVE}};

# Set cache entry validation interval
# Template variable: NGINX_OPEN_FILE_CACHE_VALID (default: 2m)
# Defines how often nginx checks if cached file information is still valid
# Lower values ensure fresher data but increase I/O overhead
# Higher values improve performance but may serve stale file information
open_file_cache_valid {{NGINX_OPEN_FILE_CACHE_VALID}};

# Set minimum file access count before caching
# Template variable: NGINX_OPEN_FILE_CACHE_MIN_USES (default: 2)
# Files must be accessed this many times within the inactive period to be cached
# Prevents one-time requests from polluting the cache with unused entries
# Balances cache efficiency with memory usage
open_file_cache_min_uses {{NGINX_OPEN_FILE_CACHE_MIN_USES}};

# Enable caching of file lookup errors
# Caches negative results (file not found, permission denied, etc.)
# Prevents repeated filesystem lookups for non-existent files
# Particularly useful for reducing I/O overhead from 404 requests
# Improves performance when serving requests for missing static assets
open_file_cache_errors on;
